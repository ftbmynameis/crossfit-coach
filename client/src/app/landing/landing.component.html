<mat-toolbar class="toolbar">
  <span>CrossFit Coach</span>
</mat-toolbar>

<main class="landing-content">
  <mat-card class="landing-card">
    <mat-card-header>
      <mat-card-title>CrossFit Coach</mat-card-title>
      <mat-card-subtitle>Your personal CrossFit tracker</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <p>
        Log workouts, track progression, and get weight suggestions tailored to
        how you're feeling — so every session is challenging but completable.
      </p>
      <p class="api-status">API: {{ apiStatus() }}</p>
    </mat-card-content>
  </mat-card>
</main>
