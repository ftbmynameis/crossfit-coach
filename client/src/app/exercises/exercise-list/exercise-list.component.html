<div class="exercise-list-container">
  <h1>Exercise Library</h1>

  <mat-form-field appearance="outline" class="filter-field">
    <mat-label>Filter</mat-label>
    <input matInput (input)="applyFilter($event)" placeholder="Search exercises…" />
    <mat-icon matSuffix>search</mat-icon>
  </mat-form-field>

  @if (loading()) {
    <p>Loading…</p>
  } @else if (error()) {
    <p class="error">{{ error() }}</p>
  } @else {
    <div class="table-wrapper">
      <table mat-table [dataSource]="dataSource" matSort>

        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
          <td mat-cell *matCellDef="let row">{{ row.name }}</td>
        </ng-container>

        <ng-container matColumnDef="mechanic">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Mechanic</th>
          <td mat-cell *matCellDef="let row">{{ row.mechanic ?? '—' }}</td>
        </ng-container>

        <ng-container matColumnDef="equipment">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Equipment</th>
          <td mat-cell *matCellDef="let row">{{ row.equipment ?? '—' }}</td>
        </ng-container>

        <ng-container matColumnDef="isCrossFit">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>CrossFit</th>
          <td mat-cell *matCellDef="let row">
            <mat-checkbox [checked]="row.isCrossFit" [disabled]="true" />
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell no-data" [attr.colspan]="displayedColumns.length">
            No exercises match "{{ dataSource.filter }}"
          </td>
        </tr>
      </table>
    </div>

    <mat-paginator [pageSizeOptions]="[25, 50, 100]" pageSize="50" showFirstLastButtons />
  }
</div>
